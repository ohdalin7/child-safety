<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>생존확인 앱</title>
    <script>
        // 1초 후 동의 페이지로 이동
        setTimeout(() => {
            window.location.href = 'consent.html';
        }, 1000);
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.95;
        }

        .description {
            font-size: 14px;
            margin-bottom: 40px;
            opacity: 0.85;
            line-height: 1.6;
        }

        .loading {
            margin-bottom: 30px;
            font-size: 14px;
            opacity: 0.8;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.25);
            padding: 14px 35px;
            border-radius: 10px;
            display: inline-block;
            transition: all 0.3s;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 15px;
        }

        a:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .info {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.7;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .features {
            text-align: left;
            margin-top: 20px;
            font-size: 13px;
        }

        .features li {
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }

        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 28px;
            }

            .emoji {
                font-size: 48px;
            }

            .subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="emoji">💙</div>
    <h1>성인자녀 생존신고</h1>
    <p class="subtitle">부모와 성인자녀를 위한 안전한 앱</p>
    
    <p class="description">
        실시간 생존 신고, 강력한 모닝콜,<br>
        Todo 관리, 화상 통화까지<br>
        모든 기능이 포함되어 있습니다
    </p>

    <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 10px;">준비 중입니다...</p>
    </div>

    <a href="consent.html">📱 앱 시작하기</a>

    <div class="info">
        <strong>이 앱의 기능:</strong>
        <ul class="features">
            <li>백그라운드 생존 신고 (자동)</li>
            <li>강력한 모닝콜 (ADHD 친화)</li>
            <li>음성 일정 등록</li>
            <li>Todo List + 마감 알림</li>
            <li>실시간 화상/음성 통화</li>
        </ul>
    </div>
</div>

</body>
</html>
